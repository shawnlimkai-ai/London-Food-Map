function hv(a1,o1,a2,o2){const R=6371,da=(a2-a1)*Math.PI/180,do_=(o2-o1)*Math.PI/180,x=Math.sin(da/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(do_/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

function sa(){
  const v=document.getElementById('as').value;
  if(!v)return;
  const[la,lo]=v.split(',').map(Number);
  document.getElementById('lat').value=la;
  document.getElementById('lng').value=lo;
  calc();
}

function openMaps(name){
  window.open('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(name+' London'),'_blank');
}

function calc(){
  const la=parseFloat(document.getElementById('lat').value),
        lo=parseFloat(document.getElementById('lng').value),
        r=parseFloat(document.getElementById('rad').value),
        tf=document.getElementById('typ').value;
  const rd=document.getElementById('res'),rh=document.getElementById('rh');
  if(isNaN(la)||isNaN(lo)){rd.innerHTML='';rh.textContent='';return;}
  let f=P.map(p=>({...p,d:hv(la,lo,p.a,p.o)}))
    .filter(p=>p.d<=r)
    .filter(p=>!tf||p.t.includes(tf))
    .sort((a,b)=>a.d-b.d);
  rh.textContent=f.length?`${f.length} place${f.length!==1?'s':''} within ${r<1?r*1000+'m':r+'km'}`:'';
  if(!f.length){rd.innerHTML='<p class="nr">No saved places nearby — try increasing the radius.</p>';return;}
  rd.innerHTML=f.map(p=>`
    <div class="pc" onclick="openMaps('${p.n.replace(/'/g,"\\'")}')">
      <div>
        <div class="pn">${p.n}</div>
        <div class="pm">${p.t}</div>
      </div>
      <div class="pd">${p.d<1?Math.round(p.d*1000)+'m':p.d.toFixed(2)+'km'}</div>
    </div>
  `).join('');
}
</script>
